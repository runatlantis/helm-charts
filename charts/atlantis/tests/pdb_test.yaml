---
suite: test pod disruption budget
templates:
  - pdb.yaml
release:
  name: my-release
tests:
  - it: is not created by default
    asserts:
      - hasDocuments:
          count: 0
  - it: default values when enabled
    set:
      podDisruptionBudget:
        enabled: true
    asserts:
      - isKind:
          of: PodDisruptionBudget
      - equal:
          path: apiVersion
          value: policy/v1
      - equal:
          path: metadata.name
          value: my-release-atlantis
      - equal:
          path: spec.minAvailable
          value: 1
      - notExists:
          path: spec.maxUnavailable
      - equal:
          path: spec.selector.matchLabels
          value:
            app: atlantis
            release: my-release
  - it: minAvailable can be overridden
    set:
      podDisruptionBudget:
        enabled: true
        minAvailable: 2
    asserts:
      - equal:
          path: spec.minAvailable
          value: 2
  - it: maxUnavailable takes precedence over minAvailable
    set:
      podDisruptionBudget:
        enabled: true
        maxUnavailable: 1
    asserts:
      - equal:
          path: spec.maxUnavailable
          value: 1
      - notExists:
          path: spec.minAvailable
  - it: supports percentage values
    set:
      podDisruptionBudget:
        enabled: true
        maxUnavailable: 50%
    asserts:
      - equal:
          path: spec.maxUnavailable
          value: 50%
  - it: labels and annotations
    set:
      podDisruptionBudget:
        enabled: true
        labels:
          team: infra
        annotations:
          foo: bar
    asserts:
      - equal:
          path: metadata.labels.team
          value: infra
      - equal:
          path: metadata.annotations.foo
          value: bar
  - it: commonLabels
    set:
      podDisruptionBudget:
        enabled: true
      commonLabels:
        team: infra
    asserts:
      - equal:
          path: metadata.labels.team
          value: infra
